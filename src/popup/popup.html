<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Programmers Extend Settings</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup-root">
      <section class="panel panel-title">
        <h1 class="title">Programmers Extend</h1>
      </section>

      <section class="panel panel-level">
        <h2 class="section-title">
          레벨 표시
          <span class="help-wrap">
            <button type="button" class="help-trigger" aria-label="레벨 표시 도움말">?</button>
            <span class="help-bubble" role="tooltip">현재 문제의 레벨을 문제 제목 앞 부분에 표시할 수 있습니다.</span>
          </span>
        </h2>
        <div class="level-toggle-row">
          <span id="currentLevelText" class="current-level-text">현재 레벨: 확인 중...</span>
          <label class="toggle-inline" for="levelPrefixToggle">
            <span>문제 레벨 표시</span>
            <span class="toggle-switch">
              <input id="levelPrefixToggle" type="checkbox" checked />
              <span class="toggle-slider" aria-hidden="true"></span>
            </span>
          </label>
        </div>
      </section>

      <div class="section-divider" aria-hidden="true"></div>

      <section class="panel panel-config">
        <div class="config-head">
          <div class="config-meta">
            <h2 class="section-title">
              타이머 설정
              <span class="help-wrap">
                <button type="button" class="help-trigger" aria-label="타이머 설정 도움말">?</button>
                <span class="help-bubble" role="tooltip">문제 레벨별 타이머를 설정합니다. 목표 시간이 지나면 브라우저 알림으로 알려줍니다.</span>
              </span>
            </h2>
            <p class="hint">레벨별 목표 시간(분)을 설정하세요.</p>
          </div>
          <button id="saveButton" type="button" disabled>저장</button>
        </div>

        <div class="level-grid">
          <label class="level-row" data-level="0" for="minutesLv0"><span>Lv. 0</span><input id="minutesLv0" class="minutes-input" type="number" min="1" max="180" step="1" /></label>
          <label class="level-row" data-level="1" for="minutesLv1"><span>Lv. 1</span><input id="minutesLv1" class="minutes-input" type="number" min="1" max="180" step="1" /></label>
          <label class="level-row" data-level="2" for="minutesLv2"><span>Lv. 2</span><input id="minutesLv2" class="minutes-input" type="number" min="1" max="180" step="1" /></label>
          <label class="level-row" data-level="3" for="minutesLv3"><span>Lv. 3</span><input id="minutesLv3" class="minutes-input" type="number" min="1" max="180" step="1" /></label>
          <label class="level-row" data-level="4" for="minutesLv4"><span>Lv. 4</span><input id="minutesLv4" class="minutes-input" type="number" min="1" max="180" step="1" /></label>
          <label class="level-row" data-level="5" for="minutesLv5"><span>Lv. 5</span><input id="minutesLv5" class="minutes-input" type="number" min="1" max="180" step="1" /></label>
        </div>
      </section>

      <div class="section-divider" aria-hidden="true"></div>

      <section class="panel panel-status">
        <p id="statusText" class="status" aria-live="polite"></p>
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
